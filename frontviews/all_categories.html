<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shurafah — Categories</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080B12;--surface:#0F1420;--surface2:#161C2E;--surface3:#1E2740;
  --accent:#FF6B35;--accent2:#FFB347;--blue:#4D9FFF;--green:#2ECC8F;
  --purple:#9B6BFF;--pink:#FF4D8F;--yellow:#FFD166;
  --text:#F0F4FF;--text2:#8A94B0;--text3:#4A5270;
  --border:rgba(255,255,255,0.06);
}
body.light{
  --bg:#F4F6FC;--surface:#FFFFFF;--surface2:#E8ECF7;--surface3:#D8DEEF;
  --text:#12172E;--text2:#5A6380;--text3:#9AA0BA;
  --border:rgba(0,0,0,0.07);
}
body.light .hero-strip{background:linear-gradient(135deg,#EEE8FA,#E8EEF8) !important;border-color:rgba(77,159,255,0.2) !important;}
body.light .cat-tile{border-color:rgba(0,0,0,0.06) !important;}
body.light .cat-row{border-color:rgba(0,0,0,0.06) !important;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.phone{width:100%;background:var(--bg);display:flex;flex-direction:column;min-height:100vh;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

/* STATUS */
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 0;font-size:11px;font-weight:700;font-family:sans-serif;}
.si{display:flex;gap:5px;align-items:center;}
.si svg{width:12px;height:12px;fill:var(--text);}

/* TOP NAV */
.topnav{display:flex;align-items:center;gap:12px;padding:12px 16px 0;}
.back-btn{width:34px;height:34px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer;flex-shrink:0;}
.back-btn svg{width:15px;height:15px;fill:none;stroke:var(--text2);stroke-width:2;}
.page-title{font-family:sans-serif;font-size:18px;font-weight:800;flex:1;}
.page-title span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.theme-toggle{display:inline-flex;align-items:center;gap:5px;cursor:pointer;background:var(--surface2);border-radius:50px;padding:5px 10px 5px 8px;border:1.5px solid var(--accent);flex-shrink:0;user-select:none;}
.theme-toggle .tt-icon{font-size:13px;}
.theme-toggle .tt-label{font-family:sans-serif;font-size:9px;font-weight:700;color:var(--accent);}

/* HERO STRIP */
.hero-strip{margin:14px 14px 0;background:linear-gradient(135deg,#080A20,#0A0820,#080820);border-radius:16px;padding:14px 16px;border:1px solid rgba(77,159,255,0.2);position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;}
.hero-strip::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,rgba(77,159,255,0.18) 0%,transparent 70%);}
.hs-icon{font-size:28px;flex-shrink:0;}
.hs-info{flex:1;}
.hs-label{font-size:10px;color:rgba(77,159,255,0.7);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.4px;font-family:sans-serif;font-weight:600;}
.hs-val{font-family:sans-serif;font-size:18px;font-weight:800;color:var(--blue);}
.hs-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.hs-stats{display:flex;gap:14px;}
.hs-stat-n{font-family:sans-serif;font-size:14px;font-weight:800;}
.hs-stat-l{font-size:9px;color:var(--text3);margin-top:1px;}

/* SEARCH */
.search-wrap{margin:12px 14px 0;position:relative;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px 10px 38px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus{border-color:rgba(77,159,255,0.4);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);}
.search-icon svg{width:14px;height:14px;fill:none;stroke:var(--text3);stroke-width:2;}

/* SORT + VIEW TOGGLE */
.sort-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 8px;}
.sort-info{font-size:11px;color:var(--text3);}
.sort-info b{color:var(--text2);}
.view-toggle{display:flex;gap:4px;background:var(--surface);border-radius:9px;padding:3px;border:1px solid var(--border);}
.vt-btn{width:28px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s;}
.vt-btn.active{background:var(--blue);}
.vt-btn svg{width:13px;height:13px;fill:none;stroke:var(--text3);stroke-width:2;}
.vt-btn.active svg{stroke:white;}

/* ── GRID VIEW ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;}

.cat-tile{border-radius:16px;padding:16px 14px;cursor:pointer;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.05);min-height:110px;display:flex;flex-direction:column;justify-content:flex-end;transition:transform 0.15s,box-shadow 0.15s;}
.cat-tile:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.35);}
.cat-tile::before{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,0.06);}

.cat-emoji{position:absolute;top:12px;right:14px;font-size:28px;opacity:0.9;}
.cat-name{font-family:sans-serif;font-size:13px;font-weight:800;margin-bottom:3px;position:relative;z-index:1;}
.cat-count{font-size:10px;color:rgba(255,255,255,0.55);position:relative;z-index:1;}
.cat-sub-count{font-size:9px;color:rgba(255,255,255,0.38);margin-top:1px;position:relative;z-index:1;}

/* bar showing song fill */
.cat-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 16px 16px;opacity:0.6;}

/* category colour themes */
.ct1{background:linear-gradient(135deg,#1A0A3A,#2D1060);}
.ct2{background:linear-gradient(135deg,#0A1F2E,#0D3B5E);}
.ct3{background:linear-gradient(135deg,#1A1A0A,#2A0A1A);}
.ct4{background:linear-gradient(135deg,#0A2A1A,#0A1A3A);}
.ct5{background:linear-gradient(135deg,#2A0A0A,#3A1A00);}
.ct6{background:linear-gradient(135deg,#0A0A2A,#1A0A2A);}
.ct7{background:linear-gradient(135deg,#0A1A0A,#1A2A0A);}
.ct8{background:linear-gradient(135deg,#2A1A0A,#1A0A1A);}

/* ── LIST VIEW ── */
.cat-list{padding:0 14px;display:flex;flex-direction:column;gap:6px;}

.cat-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border-radius:14px;border:1px solid var(--border);cursor:pointer;transition:border-color 0.15s,transform 0.15s;}
.cat-row:hover{border-color:rgba(77,159,255,0.25);transform:translateX(2px);}

.cr-icon{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.cr-info{flex:1;min-width:0;}
.cr-name{font-family:sans-serif;font-size:13px;font-weight:800;margin-bottom:2px;}
.cr-desc{font-size:10px;color:var(--text2);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-tags{display:flex;gap:5px;}
.cr-tag{font-size:8px;font-family:sans-serif;font-weight:700;padding:2px 7px;border-radius:4px;}
.cr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.cr-count{font-family:sans-serif;font-size:14px;font-weight:800;color:var(--blue);}
.cr-count-lbl{font-size:9px;color:var(--text3);}
.cr-arrow svg{width:14px;height:14px;fill:none;stroke:var(--text3);stroke-width:2;}

/* song fill progress inside list row */
.cr-progress{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:4px;}
.cr-progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}

/* PAGINATION */
.pagination-wrap{margin:16px 14px;background:var(--surface);border-radius:16px;padding:14px 16px;border:1px solid var(--border);}
.page-info{text-align:center;font-size:11px;color:var(--text3);margin-bottom:12px;}
.page-info b{color:var(--text2);}
.page-progress{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.page-progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width 0.4s ease;}
.page-controls{display:flex;align-items:center;gap:8px;}
.pg-btn{height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-family:sans-serif;font-size:11px;font-weight:700;padding:0 14px;transition:all 0.15s;border:1px solid var(--border);}
.pg-prev{background:var(--surface2);color:var(--text2);}
.pg-prev:hover{border-color:rgba(77,159,255,0.3);}
.pg-prev.disabled{opacity:0.35;pointer-events:none;}
.pg-next{background:var(--blue);color:white;flex:1;border-color:var(--blue);box-shadow:0 3px 12px rgba(77,159,255,0.28);}
.pg-next.disabled{opacity:0.4;pointer-events:none;}
.pg-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;}
.page-dots{flex:1;display:flex;justify-content:center;gap:5px;align-items:center;}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--surface3);cursor:pointer;transition:all 0.2s;}
.pdot.active{background:var(--blue);width:18px;border-radius:4px;}
.end-msg{text-align:center;padding:12px 14px;font-size:11px;color:var(--text3);font-family:sans-serif;}

/* MINI PLAYER */
.mini-player{margin:6px 12px 6px;background:linear-gradient(135deg,#080A20,#0A0820);border-radius:15px;padding:10px 12px;border:1px solid rgba(77,159,255,0.15);box-shadow:0 6px 22px rgba(0,0,0,0.45);flex-shrink:0;}
.mp-top{display:flex;align-items:center;gap:10px;}
.mp-art{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.mp-inf{flex:1;min-width:0;}
.mp-title{font-family:sans-serif;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;}
.mp-artist{font-size:10px;color:var(--text2);}
.mp-ctrl{display:flex;align-items:center;gap:6px;}
.mp-ctrl > svg{width:17px;height:17px;fill:none;stroke:var(--text2);stroke-width:2;cursor:pointer;}
.mp-play{width:32px;height:32px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.mp-play svg{width:13px;height:13px;fill:white;}
.mp-prog{display:flex;align-items:center;gap:7px;margin-top:7px;}
.mp-bar{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.mp-fill{width:55%;height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;}
.mp-t{font-size:9px;color:var(--text3);font-family:sans-serif;}

/* BOTTOM NAV */
.bnav{display:flex;justify-content:space-around;align-items:center;padding:10px 8px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;position:sticky;bottom:0;z-index:10;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 10px;border-radius:10px;}
.ni.on{background:rgba(255,107,53,0.1);}
.ni svg{width:18px;height:18px;fill:none;stroke:var(--text3);stroke-width:2;}
.ni.on svg{stroke:var(--accent);}
.nl{font-size:9px;font-family:sans-serif;font-weight:700;color:var(--text3);}
.ni.on .nl{color:var(--accent);}

.spacer{height:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE DESIGN */
@media (min-width:768px) {
  .phone { max-width:768px; margin:0 auto; }
  .topnav { padding:16px 24px 0; }
  .hero-strip { margin:18px 24px 0; }
  .search-wrap { margin:16px 24px 0; }
  .sort-row { padding:12px 24px 10px; }
  .cat-grid { padding:0 24px; gap:12px; }
  .cat-list { padding:0 24px; }
  .mp { margin:10px 24px 6px; }
}

@media (min-width:1024px) {
  .phone { max-width:1000px; }
  .topnav { padding:20px 32px 0; }
  .hero-strip { margin:22px 32px 0; }
  .search-wrap { margin:20px 32px 0; }
  .sort-row { padding:14px 32px 12px; }
  .cat-grid { padding:0 32px; gap:14px; }
  .cat-list { padding:0 32px; }
  .mp { margin:12px 32px 6px; }
}

@media (max-width:480px) {
  .topnav { padding:10px 14px 0; }
  .hero-strip { margin:12px 12px 0; }
  .search-wrap { margin:10px 12px 0; }
  .sort-row { padding:10px 12px 8px; }
  .cat-grid { padding:0 12px; gap:8px; }
  .cat-list { padding:0 12px; }
  .mp { margin:8px 12px 6px; }
}

/* Thumbnail display styles */
.cat-visual{position:absolute;top:12px;right:14px;width:50px;height:50px;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.cat-thumb{width:100%;height:100%;object-fit:cover;}
.cr-visual{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.cr-thumb{width:100%;height:100%;object-fit:cover;}
</style>
</head>

<script>
// Clock
function tick() {
  var n = new Date();
  var clkEl = document.getElementById('clk');
  if (clkEl) clkEl.textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tick();
setInterval(tick, 30000);

// ─────────────────────────────────────────────────────────
// STATIC DATA — 8 main categories (all fit on 1 page)
// Laravel: var ALL_CATS = {!! json_encode($categories) !!};
// Each object maps to a Category model field.
// fillPct = percentage of total songs in this category (for progress bar)
// ─────────────────────────────────────────────────────────
var ALL_CATS = [

var PER_PAGE    = 8;
var currentPage = 1;
var currentView = 'grid';
var searchQuery = '';

function getFiltered() {
  if (!searchQuery) return ALL_CATS.slice();
  var q = searchQuery.toLowerCase();
  return ALL_CATS.filter(function(c) {
    return c.name.toLowerCase().indexOf(q) !== -1 || c.desc.toLowerCase().indexOf(q) !== -1;
  });
}

function getTotalPages(filtered) {
  return Math.max(1, Math.ceil(filtered.length / PER_PAGE));
}

function setView(v) {
  currentView = v;
  document.getElementById('gridViewBtn').classList.toggle('active', v === 'grid');
  document.getElementById('listViewBtn').classList.toggle('active', v === 'list');
  renderCats();
}

function renderCats() {
  var filtered = getFiltered();
  var tp    = getTotalPages(filtered);
  if (currentPage > tp) { currentPage = 1; }

  var start = (currentPage - 1) * PER_PAGE;
  var end   = Math.min(start + PER_PAGE, filtered.length);
  var page  = filtered.slice(start, end);

  document.getElementById('rangeLabel').textContent   = filtered.length === 0 ? '0' : (start + 1) + '–' + end;
  document.getElementById('totalLabel').textContent   = filtered.length;
  document.getElementById('curPage').textContent      = currentPage;
  document.getElementById('totalPages').textContent   = tp;
  document.getElementById('progressFill').style.width = (currentPage / tp * 100) + '%';
  document.getElementById('endMsg').style.display     = (currentPage === tp && tp > 1) ? 'block' : 'none';
  document.getElementById('paginationWrap').style.display = (tp > 1) ? 'block' : 'none';
  document.getElementById('prevBtn').classList.toggle('disabled', currentPage === 1);
  document.getElementById('nextBtn').classList.toggle('disabled', currentPage === tp);

  // Dots
  var dotsEl = document.getElementById('pageDots');
  dotsEl.innerHTML = '';
  for (var p = Math.max(1, currentPage - 2); p <= Math.min(tp, currentPage + 2); p++) {
    var d = document.createElement('div');
    d.className = 'pdot' + (p === currentPage ? ' active' : '');
    (function(pp) { d.onclick = function() { goToPage(pp); }; }(p));
    dotsEl.appendChild(d);
  }

  var container = document.getElementById('catsContainer');
  container.innerHTML = '';

  if (page.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:32px 14px;color:var(--text3);font-size:12px;">No categories found.</div>';
    return;
  }

  if (currentView === 'grid') {
    var grid = document.createElement('div');
    grid.className = 'cat-grid';

    for (var i = 0; i < page.length; i++) {
      var c = page[i];
      var tile = document.createElement('div');
      tile.className = 'cat-tile ' + c.tileCls;
      tile.style.animation = 'fadeUp 0.3s ease both';
      tile.style.animationDelay = (i * 0.05) + 's';
      tile.innerHTML =
        '<div class="cat-visual">' +
          (c.thumbnail ? '<img src="' + c.thumbnail + '" alt="' + c.name + '" class="cat-thumb">' : '<div class="cat-emoji">' + c.emoji + '</div>') +
        '</div>' +
        '<div class="cat-name">' + c.name + '</div>' +
        '<div class="cat-count">' + c.songs.toLocaleString() + ' songs</div>' +
        '<div class="cat-sub-count">' + c.subcats + ' sub-categories</div>' +
        '<div class="cat-bar" style="background:' + c.barColor + ';width:' + c.fillPct + '%;"></div>';
      (function(catData) {
        tile.style.cursor = 'pointer';
        tile.addEventListener('click', function() {
          window.location.href = 'subcategory_songs.html?cat=' + encodeURIComponent(catData.name);
        });
      })(c);
      grid.appendChild(tile);
    }
    container.appendChild(grid);

  } else {
    var list = document.createElement('div');
    list.className = 'cat-list';

    for (var j = 0; j < page.length; j++) {
      var cat = page[j];
      var row = document.createElement('div');
      row.className = 'cat-row';
      row.style.animation = 'fadeUp 0.3s ease both';
      row.style.animationDelay = (j * 0.045) + 's';

      // Build tags html
      var tagsHtml = '';
      for (var t = 0; t < cat.tags.length; t++) {
        tagsHtml +=
          '<div class="cr-tag" style="background:' + cat.tagColors[t] + ';color:' + cat.tagTextColors[t] + ';border:1px solid ' + cat.tagColors[t].replace('0.15','0.3').replace('0.12','0.25').replace('0.10','0.2').replace('0.1)','0.2)') + ';">' +
            cat.tags[t] +
          '</div>';
      }

      row.innerHTML =
        '<div class="cr-visual">' +
          (cat.thumbnail ? '<img src="' + cat.thumbnail + '" alt="' + cat.name + '" class="cr-thumb">' : '<div class="cr-icon ' + cat.tileCls + '">' + cat.emoji + '</div>') +
        '</div>' +
        '<div class="cr-info">' +
          '<div class="cr-name">' + cat.name + '</div>' +
          '<div class="cr-desc">' + cat.desc + '</div>' +
          '<div class="cr-tags">' + tagsHtml + '</div>' +
          '<div class="cr-progress"><div class="cr-progress-fill" style="width:' + cat.fillPct + '%;background:' + cat.barColor + ';"></div></div>' +
        '</div>' +
        '<div class="cr-right">' +
          '<div class="cr-count">' + cat.songs.toLocaleString() + '</div>' +
          '<div class="cr-count-lbl">songs</div>' +
          '<div class="cr-count" style="color:var(--purple);font-size:11px;">' + cat.subcats + '</div>' +
          '<div class="cr-count-lbl">sub-cats</div>' +
          '<div class="cr-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>' +
        '</div>';

      (function(catData) {
        row.addEventListener('click', function() {
          window.location.href = 'subcategory_songs.html?cat=' + encodeURIComponent(catData.name);
        });
      })(cat);
      list.appendChild(row);
    }
    container.appendChild(list);
  }

  document.querySelector('.scroll').scrollTop = 0;
}

function changePage(dir) {
  var tp = getTotalPages(getFiltered());
  var next = currentPage + dir;
  if (next >= 1 && next <= tp) {
    currentPage = next;
    renderCats();
  }
}

function goToPage(p) {
  currentPage = p;
  renderCats();
}

// Search — debounced
var searchTimer = null;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  var val = this.value;
  searchTimer = setTimeout(function() {
    searchQuery = val.trim();
    currentPage = 1;
    renderCats();
  }, 250);
});

// Theme
var _t = document.getElementById('themeToggle');
var _i = document.getElementById('ttIcon');
var _l = document.getElementById('ttLabel');
function applyTheme(isLight) {
  document.body.classList.toggle('light', isLight);
  _i.textContent = isLight ? '☀️' : '🌙';
  _l.textContent = isLight ? 'Light' : 'Dark';
}
applyTheme(localStorage.getItem('shurafah-theme') === 'light');
_t.addEventListener('click', function() {
  var n = !document.body.classList.contains('light');
  applyTheme(n);
  localStorage.setItem('shurafah-theme', n ? 'light' : 'dark');
});

// Init
renderCats();

// Mini player
var _mpPlay = document.querySelector('.mp-play');
var _mpPlaying = false;
if (_mpPlay) {
  _mpPlay.addEventListener('click', function() {
    _mpPlaying = !_mpPlaying;
    this.innerHTML = _mpPlaying
      ? '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/></svg>'
      : '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="white"/></svg>';
  });
}
var _mpArt = document.querySelector('.mp-art'), _mpInf = document.querySelector('.mp-inf');
if (_mpArt) { _mpArt.style.cursor = 'pointer'; _mpArt.addEventListener('click', function() { window.location.href = 'song_detail_page.html'; }); }
if (_mpInf) { _mpInf.style.cursor = 'pointer'; _mpInf.addEventListener('click', function() { window.location.href = 'song_detail_page.html'; }); }
var _mpCtrl = document.querySelectorAll('.mp-ctrl > svg');
if (_mpCtrl[0]) { _mpCtrl[0].style.cursor = 'pointer'; _mpCtrl[0].addEventListener('click', function() { _mpPlaying = true; if (_mpPlay) { _mpPlay.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/></svg>'; } }); }
if (_mpCtrl[1]) { _mpCtrl[1].style.cursor = 'pointer'; _mpCtrl[1].addEventListener('click', function() { _mpPlaying = true; if (_mpPlay) { _mpPlay.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/></svg>'; } }); }

    }

}
