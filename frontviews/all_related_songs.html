<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shurafah — Related Songs</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080B12;--surface:#0F1420;--surface2:#161C2E;--surface3:#1E2740;
  --accent:#FF6B35;--accent2:#FFB347;
  --blue:#4D9FFF;--green:#2ECC8F;--purple:#9B6BFF;--pink:#FF4D8F;--yellow:#FFD166;
  --text:#F0F4FF;--text2:#8A94B0;--text3:#4A5270;
  --border:rgba(255,255,255,0.06);
}
body.light{
  --bg:#F4F6FC;--surface:#FFFFFF;--surface2:#E8ECF7;--surface3:#D8DEEF;
  --text:#12172E;--text2:#5A6380;--text3:#9AA0BA;--border:rgba(0,0,0,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:background .3s,color .3s;}
.phone{width:100%;background:var(--bg);display:flex;flex-direction:column;min-height:100vh;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:80px;}
.scroll::-webkit-scrollbar{display:none;}

/* HEADER */
.tbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;gap:10px;}
.tb-back{width:36px;height:36px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:background .2s;}
.tb-back:hover{background:var(--surface2);}
.tb-back svg{width:14px;height:14px;fill:none;stroke:var(--text);stroke-width:2;}
.tb-title{flex:1;font-family:sans-serif;font-size:15px;font-weight:800;letter-spacing:-.3px;text-align:center;}
.theme-toggle{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border-radius:50px;padding:5px 10px 5px 8px;border:1.5px solid var(--accent);cursor:pointer;flex-shrink:0;}
.tt-icon{font-size:13px;}.tt-label{font-family:sans-serif;font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.3px;}

/* SONG CONTEXT MINI CARD */
.ctx-card{margin:10px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.ctx-art{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#9B6BFF,#4D9FFF);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ctx-info{flex:1;min-width:0;}
.ctx-label{font-size:9px;color:var(--text3);font-family:sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.ctx-title{font-family:sans-serif;font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctx-sub{font-size:10px;color:var(--text2);}

/* STATS */
.stats-bar{display:flex;gap:0;padding:10px 16px 0;}
.stat-chip{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 10px;text-align:center;margin:0 3px;}
.stat-chip:first-child{margin-left:0;}.stat-chip:last-child{margin-right:0;}
.stat-v{font-family:sans-serif;font-size:14px;font-weight:800;color:var(--accent);}
.stat-l{font-size:9px;color:var(--text3);}

/* SEARCH */
.sw{padding:10px 16px 0;}
.sb{background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;gap:10px;padding:10px 14px;transition:border-color .2s;}
.sb:focus-within{border-color:var(--accent);}
.sb svg{width:14px;height:14px;fill:none;stroke:var(--text3);stroke-width:2;flex-shrink:0;}
.sb input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;flex:1;font-family:'DM Sans',sans-serif;}
.sb input::placeholder{color:var(--text3);}

/* FILTER PILLS */
.fp{display:flex;gap:7px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none;}
.fp::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;padding:6px 14px;border-radius:50px;font-family:sans-serif;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;background:var(--surface);color:var(--text2);border:1px solid var(--border);transition:all .15s;}
.pill.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1A0800;border-color:transparent;box-shadow:0 3px 10px rgba(255,107,53,.3);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px 8px;}
.shead-c{font-size:10px;color:var(--text3);margin-right:auto;}
.sort-sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.vt-wrap{display:flex;gap:4px;}
.vt-btn{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.vt-btn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;}
.vt-btn svg{width:14px;height:14px;fill:none;stroke:var(--text2);stroke-width:2;}
.vt-btn.on svg{stroke:#1A0800;}

/* CARD VIEW */
.song-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.scard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35);}
.scard-cover{height:90px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;font-size:34px;}
.scard-play-ov{position:absolute;inset:0;background:rgba(255,107,53,.15);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.scard:hover .scard-play-ov{opacity:1;}
.scard-play-ov svg{width:26px;height:26px;fill:var(--accent2);}
.scard-body{padding:10px 12px 12px;}
.scard-cat{font-size:8px;font-family:sans-serif;font-weight:700;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:5px;}
.scard-title{font-family:sans-serif;font-size:12px;font-weight:700;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.scard-artist{font-size:10px;color:var(--text2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.scard-meta{display:flex;align-items:center;justify-content:space-between;}
.scard-dur{font-size:9px;color:var(--text3);font-family:sans-serif;font-weight:600;}
.scard-plays{font-size:9px;color:var(--accent2);font-family:sans-serif;font-weight:700;}

/* LIST VIEW */
.song-list{display:flex;flex-direction:column;gap:8px;padding:0 16px;}
.srow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 12px;cursor:pointer;transition:background .15s;}
.srow:hover{background:var(--surface2);}
.srow-num{width:22px;font-family:sans-serif;font-size:11px;font-weight:800;color:var(--text3);text-align:center;flex-shrink:0;}
.srow-num.top{color:var(--accent);}
.srow-thumb{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;overflow:hidden;}
.srow-play-ov{position:absolute;inset:0;background:rgba(255,107,53,.25);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;border-radius:10px;}
.srow:hover .srow-play-ov{opacity:1;}
.srow-play-ov svg{width:14px;height:14px;fill:var(--accent2);}
.srow-body{flex:1;min-width:0;}
.srow-title{font-family:sans-serif;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.srow-sub{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.srow-cat{font-size:8px;font-family:sans-serif;font-weight:700;border-radius:4px;padding:1px 6px;}
.srow-artist{font-size:10px;color:var(--text3);}
.srow-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.srow-plays{font-size:9px;color:var(--accent2);font-family:sans-serif;font-weight:700;}
.srow-dur{font-size:9px;color:var(--text3);font-family:sans-serif;font-weight:600;}
.srow-play-btn{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.srow-play-btn svg{width:11px;height:11px;fill:#1A0800;}

/* GRADIENTS */
.g1{background:linear-gradient(135deg,#9B6BFF,#4D9FFF);}
.g2{background:linear-gradient(135deg,#FF6B35,#FFB347);}
.g3{background:linear-gradient(135deg,#FF4D8F,#FF6B35);}
.g4{background:linear-gradient(135deg,#2ECC8F,#4D9FFF);}
.g5{background:linear-gradient(135deg,#FFB347,#FF4D8F);}
.g6{background:linear-gradient(135deg,#4D9FFF,#9B6BFF);}
.g7{background:linear-gradient(135deg,#FF6B35,#FF4D8F);}
.g8{background:linear-gradient(135deg,#2ECC8F,#9B6BFF);}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 16px 6px;}
.pg-btn{min-width:32px;height:32px;padding:0 8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;}
.pg-btn:hover:not(:disabled){background:var(--surface2);color:var(--text);}
.pg-btn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1A0800;border-color:transparent;}
.pg-btn:disabled{opacity:.35;cursor:not-allowed;}

/* EMPTY */
.empty{padding:48px 24px;text-align:center;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-msg{font-family:sans-serif;font-size:13px;font-weight:700;color:var(--text3);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;width:100%;height:62px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:50;transition:background .3s;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;cursor:pointer;text-decoration:none;color:var(--text3);transition:color .15s;}
.ni svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;}
.ni .nl{font-size:9px;font-family:sans-serif;font-weight:700;}

@media (min-width:640px){.tbar{padding:16px 24px 4px;}.stats-bar,.sw,.fp,.toolbar{padding-left:24px;padding-right:24px;}.song-cards,.song-list,.pagination{padding-left:24px;padding-right:24px;}.song-cards{grid-template-columns:repeat(3,1fr);}.ctx-card{margin-left:24px;margin-right:24px;}}
@media (min-width:1024px){.phone{max-width:1200px;margin:0 auto;}.tbar{padding:20px 40px 6px;}.stats-bar,.sw,.fp,.toolbar{padding-left:40px;padding-right:40px;}.song-cards,.song-list,.pagination{padding-left:40px;padding-right:40px;}.song-cards{grid-template-columns:repeat(4,1fr);gap:14px;}.ctx-card{margin-left:40px;margin-right:40px;}.bnav{max-width:1200px;left:50%;right:auto;transform:translateX(-50%);padding:0 40px;}}
@media (max-width:480px){.tbar{padding:12px 14px 4px;}.stats-bar,.sw,.fp,.toolbar{padding-left:14px;padding-right:14px;}.song-cards,.song-list,.pagination{padding-left:14px;padding-right:14px;}.ctx-card{margin-left:14px;margin-right:14px;}.ni .nl{font-size:8px;}.ni svg{width:18px;height:18px;}}
</style>
</head>

  Nasheeds:   {bg:'rgba(255,107,53,.12)',  text:'var(--accent)'},
  Hausa:      {bg:'rgba(77,159,255,.12)',  text:'var(--blue)'},
  Devotional: {bg:'rgba(46,204,143,.12)', text:'var(--green)'},
};

var currentFilter = 'all', currentSort = 'plays', currentView = 'list', currentPage = 1;
var PG_CARD = 6, PG_LIST = 8, _filtered = SONGS.slice();

var _toast = null;
function showToast(msg) {
  if (!_toast) {
    _toast = document.createElement('div');
    _toast.style.cssText = 'position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface3);color:var(--text);font-family:sans-serif;font-size:12px;font-weight:600;padding:8px 18px;border-radius:50px;z-index:999;border:1px solid var(--border);white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.5);';
    document.body.appendChild(_toast);
  }
  _toast.textContent = msg;
  _toast.style.opacity = 1; _toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(_toast._t);
  _toast._t = setTimeout(function() { _toast.style.opacity = 0; _toast.style.transform = 'translateX(-50%) translateY(8px)'; }, 2400);
}

function parseNum(v) { return parseFloat((v||'0').replace(/[KMB]/g, function(m){ return m==='K'?'e3':m==='M'?'e6':'e9'; })); }

function getSorted(list) {
  var s = list.slice();
  var ord = ['Today','Yesterday','2 hrs ago','2 days ago','3 days ago','4 days ago','5 days ago','6 days ago','1 week ago','2 weeks ago'];
  if (currentSort === 'plays')     s.sort(function(a,b){ return parseNum(b.plays) - parseNum(a.plays); });
  else if (currentSort === 'downloads') s.sort(function(a,b){ return parseNum(b.dls) - parseNum(a.dls); });
  else if (currentSort === 'recent')    s.sort(function(a,b){ return ord.indexOf(a.added) - ord.indexOf(b.added); });
  else                                  s.sort(function(a,b){ return a.title.localeCompare(b.title); });
  return s;
}

function renderPage() {
  var cont = document.getElementById('container');
  cont.innerHTML = '';
  if (!_filtered.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">🎵</div><div class="empty-msg">No songs found</div></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  var ps = currentView === 'card' ? PG_CARD : PG_LIST;
  var tp = Math.ceil(_filtered.length / ps);
  if (currentPage > tp) currentPage = 1;
  var start = (currentPage - 1) * ps;
  var items = _filtered.slice(start, start + ps);

  if (currentView === 'card') {
    cont.className = 'song-cards';
    items.forEach(function(s) {
      var cc = catColors[s.cat] || {bg:'rgba(255,107,53,.12)',text:'var(--accent)'};
      var el = document.createElement('div');
      el.className = 'scard';
      el.innerHTML = '<div class="scard-cover ' + s.grad + '">' + s.emoji +
        '<div class="scard-play-ov"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>' +
        '<div class="scard-body">' +
          '<span class="scard-cat" style="background:' + cc.bg + ';color:' + cc.text + ';">' + s.cat + '</span>' +
          '<div class="scard-title">' + s.title + '</div>' +
          '<div class="scard-artist">' + s.artist + '</div>' +
          '<div class="scard-meta"><span class="scard-dur">' + s.dur + '</span><span class="scard-plays">' + s.plays + '</span></div>' +
        '</div>';
      el.addEventListener('click', function() { window.location.href = 'song_detail_page.html'; });
      cont.appendChild(el);
    });
  } else {
    cont.className = 'song-list';
    items.forEach(function(s, idx) {
      var rank = start + idx + 1;
      var cc = catColors[s.cat] || {bg:'rgba(255,107,53,.12)',text:'var(--accent)'};
      var row = document.createElement('div');
      row.className = 'srow';
      row.innerHTML =
        '<div class="srow-num' + (rank <= 3 ? ' top' : '') + '">' + rank + '</div>' +
        '<div class="srow-thumb ' + s.grad + '">' + s.emoji +
          '<div class="srow-play-ov"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>' +
        '<div class="srow-body">' +
          '<div class="srow-title">' + s.title + '</div>' +
          '<div class="srow-sub">' +
            '<span class="srow-cat" style="background:' + cc.bg + ';color:' + cc.text + ';">' + s.cat + '</span>' +
            '<span class="srow-artist">' + s.artist + '</span>' +
          '</div></div>' +
        '<div class="srow-right"><span class="srow-plays">' + s.plays + '</span><span class="srow-dur">' + s.dur + '</span></div>' +
        '<div class="srow-play-btn"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';
      row.querySelector('.srow-play-btn').addEventListener('click', function(e) { e.stopPropagation(); window.location.href = 'song_detail_page.html'; });
      row.addEventListener('click', function() { window.location.href = 'song_detail_page.html'; });
      cont.appendChild(row);
    });
  }
  renderPagination(tp);
}

function renderPagination(tp) {
  var pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (tp <= 1) return;
  var prev = document.createElement('button'); prev.className = 'pg-btn'; prev.innerHTML = '&#8249;'; prev.disabled = currentPage === 1;
  prev.addEventListener('click', function() { currentPage--; renderPage(); document.querySelector('.scroll').scrollTop = 0; });
  pg.appendChild(prev);
  var s = Math.max(1, currentPage - 2), e = Math.min(tp, s + 4);
  if (e - s < 4) s = Math.max(1, e - 4);
  for (var p = s; p <= e; p++) {
    (function(n) {
      var b = document.createElement('button'); b.className = 'pg-btn' + (n === currentPage ? ' on' : ''); b.textContent = n;
      b.addEventListener('click', function() { currentPage = n; renderPage(); document.querySelector('.scroll').scrollTop = 0; });
      pg.appendChild(b);
    })(p);
  }
  var next = document.createElement('button'); next.className = 'pg-btn'; next.innerHTML = '&#8250;'; next.disabled = currentPage === tp;
  next.addEventListener('click', function() { currentPage++; renderPage(); document.querySelector('.scroll').scrollTop = 0; });
  pg.appendChild(next);
}

function apply() {
  var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  _filtered = getSorted(SONGS.filter(function(s) {
    var cm = currentFilter === 'all' || s.cat === currentFilter;
    var qm = !q || s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q);
    return cm && qm;
  }));
  currentPage = 1;
  document.getElementById('countLabel').textContent = _filtered.length + ' song' + (_filtered.length !== 1 ? 's' : '');
  document.getElementById('statTotal').textContent = _filtered.length;
  renderPage();
}

function applyTheme(l) {
  document.body.classList.toggle('light', l);
  document.getElementById('ttIcon').textContent  = l ? '☀️' : '🌙';
  document.getElementById('ttLabel').textContent = l ? 'Light' : 'Dark';
}
applyTheme(localStorage.getItem('shurafah-theme') === 'light');
document.getElementById('themeToggle').addEventListener('click', function() {
  var n = !document.body.classList.contains('light'); applyTheme(n); localStorage.setItem('shurafah-theme', n ? 'light' : 'dark');
});

document.getElementById('filterPills').addEventListener('click', function(e) {
  var p = e.target.closest('.pill'); if (!p) return;
  document.querySelectorAll('.pill').forEach(function(x) { x.classList.remove('on'); }); p.classList.add('on');
  currentFilter = p.getAttribute('data-filter'); apply();
});
document.getElementById('sortSelect').addEventListener('change', function() { currentSort = this.value; apply(); });
document.getElementById('vtCard').addEventListener('click', function() { currentView = 'card'; this.classList.add('on'); document.getElementById('vtList').classList.remove('on'); currentPage = 1; renderPage(); });
document.getElementById('vtList').addEventListener('click', function() { currentView = 'list'; this.classList.add('on'); document.getElementById('vtCard').classList.remove('on'); currentPage = 1; renderPage(); });
var _st; document.getElementById('searchInput').addEventListener('input', function() { clearTimeout(_st); _st = setTimeout(apply, 280); });
apply();
</script>
</body>
</html>
